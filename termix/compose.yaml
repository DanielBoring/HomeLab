services:
  termix:
    image: ghcr.io/lukegus/termix:latest
    container_name: termix
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - termix-data:/app/data
    environment:
      PORT: "8080"

volumes:
  termix-data:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/termix
      o: bind

networks:
  termix-network:
    driver: bridge