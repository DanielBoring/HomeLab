services:
  tdarr:
    image: haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - tdarr
      - traefik
    ports:
      - "${TDARR_PORT:-8265}:8265"
      - "8266:8266"
    volumes:
      - tdarr-server:/app/server
      - tdarr-configs:/app/configs
      - tdarr-logs:/app/logs
      - tdarr-media:/data/media
      - tdarr-transcode:/temp
    environment:
      - TZ=${TZ:-America/New_York}
      - PUID=${PUID:-3001}
      - PGID=${PGID:-3001}
      - UMASK_SET=002
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=false
      - inContainer=true
      - ffmpegVersion=7
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8265/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tdarr.rule=Host(`${TDARR_DOMAIN}`)"
      - "traefik.http.routers.tdarr.entrypoints=websecure"
      - "traefik.http.routers.tdarr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tdarr.middlewares=secure-headers@file,lan-only@file"
      - "traefik.http.routers.tdarr.service=tdarr@docker"
      - "traefik.http.services.tdarr.loadbalancer.server.port=8265"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tdarr-node:
    image: haveagitgat/tdarr_node:latest
    container_name: tdarr-node
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    network_mode: "service:tdarr"
    volumes:
      - tdarr-configs:/app/configs
      - tdarr-logs:/app/logs
      - tdarr-media:/data/media
      - tdarr-transcode:/temp
    environment:
      - TZ=${TZ:-America/New_York}
      - PUID=${PUID:-3001}
      - PGID=${PGID:-3001}
      - UMASK_SET=002
      - nodeName=TrueNAS-Node
      - serverIP=0.0.0.0
      - serverPort=8266
      - inContainer=true
      - ffmpegVersion=7
      - transcodegpuWorkers=1
      - transcodecpuWorkers=1
      - healthcheckgpuWorkers=1
      - healthcheckcpuWorkers=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      tdarr:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tdarr-server:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/tdarr/server
      o: bind
  tdarr-configs:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/tdarr/configs
      o: bind
  tdarr-logs:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/tdarr/logs
      o: bind
  tdarr-media:
    driver: local
    driver_opts:
      type: none
      device: /mnt/Data/Media
      o: bind
  tdarr-transcode:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/tdarr/transcode-cache
      o: bind

networks:
  tdarr:
    name: tdarr
    driver: bridge
  traefik:
    external: true
