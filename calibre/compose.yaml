
services:
  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    #security_opt:
    #  - seccomp:unconfined  # needed on some Docker configs for the GUI
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=3001
      - PGID=3001
      - TZ=America/New_York
      - CUSTOM_PORT=8085
      - CUSTOM_HTTPS_PORT=8086
    volumes:
      - calibre-config:/config
    ports:
      - 8085:8085 # desktop GUI (http)
      - 8086:8086 # desktop GUI (https)
      - 8081:8081 # webserver GUI (enable in Calibre settings)
    shm_size: "1gb"
    networks:
      - calibre
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calibre.rule=Host(`${CALIBRE_DOMAIN}`)"
      - "traefik.http.routers.calibre.entrypoints=websecure"
      - "traefik.http.routers.calibre.tls.certresolver=letsencrypt"
      - "traefik.http.routers.calibre.middlewares=secure-headers@file,lan-only@file"
      - "traefik.http.routers.calibre.service=calibre@docker"
      - "traefik.http.services.calibre.loadbalancer.server.port=8085"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=3001
      - PGID=3001
      - TZ=America/New_York
      - DOCKER_MODS=linuxserver/mods:universal-calibre
    volumes:
      - calibre-web-config:/config
      - /mnt/Data/Media/Books:/books
    ports:
      - 8083:8083
    networks:
      - calibre
      - traefik
    depends_on:
      - calibre
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calibre-web.rule=Host(`${CALIBRE_WEB_DOMAIN}`)"
      - "traefik.http.routers.calibre-web.entrypoints=websecure"
      - "traefik.http.routers.calibre-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.calibre-web.middlewares=secure-headers@file,lan-only@file"
      - "traefik.http.routers.calibre-web.service=calibre-web@docker"
      - "traefik.http.services.calibre-web.loadbalancer.server.port=8083"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  calibre-config:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/calibre
      o: bind
  calibre-web-config:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/calibre-web
      o: bind

networks:
  calibre:
    name: calibre
    driver: bridge
  traefik:
    external: true
