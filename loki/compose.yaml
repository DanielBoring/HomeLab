
services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    user: "3001:3001"
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=Host(`${LOKI_DOMAIN}`)"
      - "traefik.http.routers.loki.entrypoints=websecure"
      - "traefik.http.routers.loki.tls.certresolver=letsencrypt"
      - "traefik.http.routers.loki.middlewares=secure-headers@file,lan-only@file"
      - "traefik.http.routers.loki.service=loki@docker"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - loki-data:/loki
    configs:
      - source: loki-config
        target: /etc/loki/config.yaml
    command: -config.file=/etc/loki/config.yaml
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


configs:
  loki-config:
    content: |
      auth_enabled: false

      server:
        http_listen_port: 3100
        grpc_listen_port: 9096
        log_level: warn

      common:
        instance_addr: 127.0.0.1
        path_prefix: /loki
        storage:
          filesystem:
            chunks_directory: /loki/chunks
            rules_directory: /loki/rules
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory

      schema_config:
        configs:
          - from: 2024-01-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      limits_config:
        retention_period: 30d
        reject_old_samples: true
        reject_old_samples_max_age: 168h
        ingestion_rate_strategy: local
        ingestion_rate_mb: 16
        ingestion_burst_size_mb: 32
        use_ring_topology: false

      compactor:
        working_directory: /loki/compactor
        retention_enabled: true
        delete_request_store: filesystem

      ingester:
        lifecycler:
          address: 127.0.0.1
          ring:
            kvstore:
              store: inmemory
            replication_factor: 1
          final_sleep: 0s
          min_ready_duration: 0s

      query_range:
        results_cache:
          cache:
            embedded_cache:
              enabled: true
              max_size_mb: 100


volumes:
  loki-data:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/loki
      o: bind

networks:
  monitoring:
    name: monitoring
    external: true
  traefik:
    name: traefik
    external: true
