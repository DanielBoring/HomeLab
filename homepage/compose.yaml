services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    volumes:
      - /mnt/SSD/Containers/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/SSD/Containers/homepage/images:/app/public/images
    environment:
      PUID: 3001
      PGID: 3001
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`${HOMEPAGE_DOMAIN:-homepage.localhost}`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls.certresolver=letsencrypt"
      - "traefik.http.routers.homepage.middlewares=secure-headers@file"
      # No server.port label needed — homepage only exposes one port (3000)
      # No traefik.docker.network label needed — only on one network

networks:
  traefik:
    external: true
