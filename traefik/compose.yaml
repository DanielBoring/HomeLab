
services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      traefik-macvlan:
        ipv4_address: 10.0.5.5   # Traefik's dedicated LAN IP
      traefik:
      monitoring:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/SSD/Containers/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /mnt/SSD/Containers/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/letsencrypt
    environment:
      - TZ=${TZ:-UTC}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_DOMAIN:-traefik.localhost}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"

volumes:
  traefik-certs:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/traefik/certs
      o: bind

networks:
  traefik-macvlan:
    driver: macvlan
    driver_opts:
      parent: enp8s0
    ipam:
      config:
        - subnet: 10.0.5.0/24
          gateway: 10.0.5.1
          ip_range: 10.0.5.5/32   # Reserve only this IP for Docker to assign
  traefik:
    name: traefik
    driver: bridge
  monitoring:
    external: true
