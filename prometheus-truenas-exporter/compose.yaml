services:
  prometheus-truenas-exporter:
    image: prom/node-exporter:latest
    container_name: prometheus-truenas-exporter
    restart: unless-stopped
    pid: host
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

networks:
  monitoring:
    external: true
