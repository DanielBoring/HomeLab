services:
  karakeep:
    image: ghcr.io/karakeep-app/karakeep:${KARAKEEP_VERSION:-release}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - karakeep
      - traefik
    env_file:
      - .env
    environment:
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      DATA_DIR: /data
      NEXTAUTH_URL: https://${KARAKEEP_DOMAIN}
    volumes:
      - karakeep-data:/data
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.karakeep.rule=Host(`${KARAKEEP_DOMAIN}`)"
      - "traefik.http.routers.karakeep.entrypoints=websecure"
      - "traefik.http.routers.karakeep.tls.certresolver=letsencrypt"
      - "traefik.http.routers.karakeep.middlewares=secure-headers@file,lan-only@file"
      - "traefik.http.routers.karakeep.service=karakeep@docker"
      - "traefik.http.services.karakeep.loadbalancer.server.port=3000"

  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    restart: unless-stopped
    networks:
      - karakeep
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  meilisearch:
    image: getmeili/meilisearch:v1.41.0
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - karakeep
    env_file:
      - .env
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - karakeep-meilisearch:/meili_data
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  karakeep-data:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/karakeep/data
      o: bind
  karakeep-meilisearch:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/karakeep/meilisearch
      o: bind

networks:
  karakeep:
    driver: bridge
  traefik:
    external: true
