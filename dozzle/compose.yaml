
services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
    ports:
      - "${DOZZLE_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dozzle-data:/data
    environment:
      - TZ=${TZ:-UTC}
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_HOSTNAME=${DOZZLE_HOSTNAME:-homelab}
      - DOZZLE_AUTH_PROVIDER=${DOZZLE_AUTH_PROVIDER:-none}
      # - DOZZLE_AUTH_TTL=48h
      # - DOZZLE_ENABLE_ACTIONS=true   # requires docker.sock without :ro
      # - DOZZLE_ENABLE_SHELL=true     # requires docker.sock without :ro
      # - DOZZLE_REMOTE_AGENT=host1:7007,host2:7007
      # - DOZZLE_FILTER=name=myapp*
      # - DOZZLE_LEVEL=info
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`${DOZZLE_DOMAIN:-dozzle.localhost}`)"
      - "traefik.http.routers.dozzle.entrypoints=websecure"
      - "traefik.http.routers.dozzle.tls.certresolver=letsencrypt"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  dozzle-data:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/dozzle
      o: bind

networks:
  traefik:
    external: true
