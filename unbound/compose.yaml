services:
  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${UNBOUND_PORT:-5335}:53/udp"
      - "${UNBOUND_PORT:-5335}:53/tcp"
    volumes:
      - unbound-config:/opt/unbound/etc/unbound
    networks:
      - dns
    healthcheck:
      test: ["CMD", "drill", "cloudflare.com", "@127.0.0.1", "-p", "53"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  unbound-config:
    driver: local
    driver_opts:
      type: none
      device: /mnt/SSD/Containers/unbound
      o: bind

networks:
  dns:
    driver: bridge
